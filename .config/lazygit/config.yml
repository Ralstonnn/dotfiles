customCommands:
  # WORKTREES
  - key: "N"
    context: "worktrees"
    description: "New worktree in ../{project-name}.worktrees/"
    prompts:
      - type: "menu"
        title: "What branch to create worktree from"
        key: "Type"
        options:
          - key: "n"
            name: "new"
            description: "new branch"
            value: "new"
          - key: "e"
            name: "existing"
            description: "existing branch"
            value: "existing"
      - type: "input"
        title: "Worktree name ../{project-name}.worktrees/{name}"
        key: "WorktreeName"
        initialValue: ""
      - type: "menu"
        title: "Select branch prefix"
        key: "BranchPrefix"
        options:
          - key: "c"
            name: "custom"
            description: "don't prefill prefix"
            value: ""
          - key: "d"
            name: "dev"
            description: "a dev branch (dev/)"
            value: "dev/"
          - key: "r"
            name: "release"
            description: "a release branch (release/)"
            value: "release/"
      - type: "input"
        title: "Branch name"
        key: "BranchName"
        initialValue: ""
    command: >
      bash -c '
        source $HOME/.config/lazygit/lazygit-functions.sh
        createWorktreeCustom {{ .Form.Type }} {{ .Form.WorktreeName }} {{ .Form.BranchPrefix }} {{ .Form.BranchName }}
      '
    loadingText: "Creating worktree"

  #LOCAL BRANCHES
  - key: "C"
    context: "localBranches"
    description: "Create and switch to dev/release branch"
    prompts:
      - type: "menu"
        title: "What kind of branch is it?"
        key: "BranchType"
        options:
          - key: "d"
            name: "dev"
            description: "a dev branch"
            value: "dev"
          - key: "r"
            name: "release"
            description: "a release branch"
            value: "release"
      - type: "input"
        title: "What is the new branch name?"
        key: "BranchName"
        initialValue: ''
    command: "git switch -c {{.Form.BranchType}}/{{.Form.BranchName}}"
    loadingText: "Creating branch"

  - key: "<c-n>"
    context: "localBranches"
    description: "Copy task name"
    command: >
      bash -c '
        source $HOME/.config/lazygit/lazygit-functions.sh
        copyTaskName
      '
    loadingText: "Copying Task Name"

  # COMMITS
  - key: "T"
    context: "files"
    description: "Commit with formatted task name message"
    prompts:
      - type: "input"
        title: "Commit message [Task Name]"
        key: "Message"
        initialValue: ""
    command: >
      bash -c '
        branch=$(git branch --show-current | awk -F/ "{print \$NF}")
        git commit -m "[${branch}] {{ .Form.Message }}"
      '
    loadingText: "Committing"
